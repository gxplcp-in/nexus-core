<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Nexus Core | Pro</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            margin: 0;
        }

        .box {
            text-align: center;
            border: 1px solid #00ffcc;
            padding: 40px;
            box-shadow: 0 0 20px #00ffcc55;
        }

        .btn {
            background: #00ffcc;
            color: #000;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px #00ffcc;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px #00ffcc;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>NEXUS CORE OS</h1>
        <p>SYSTEM READY FOR DEPLOYMENT</p><br>
        
        <button onclick="launchSystem()" class="btn">START SYSTEM</button>
    </div>

    <script>
        function launchSystem() {
            // यह कोड एक नई विंडो खोलेगा जिसमें फालतू की चीजें नहीं होंगी
            let url = "https://cyber-nexus-core--gxplcpbiz.replit.app/?embed=1";
            let params = `scrollbars=no,resizable=no,status=no,location=no,toolbar=no,menubar=no,width=${screen.width},height=${screen.height},left=0,top=0`;
            
            window.open(url, "CyberNexus", params);
        }
    </script>

</body>
</html>
