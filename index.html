<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS CORE | ABSOLUTE CONTROL</title>
    <style>
        /* डार्क साइबर थीम - जो रिप्लिट की पहचान मिटा देगा */
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            height: 100vh; overflow: hidden;
        }

        #terminal {
            padding: 20px;
            height: 80vh;
            overflow-y: auto;
            border-bottom: 2px solid #00ffcc33;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #0a0a0a;
        }

        #command-input {
            background: transparent;
            border: none;
            color: #00ffcc;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            width: 100%;
            outline: none;
        }

        .cursor { color: #00ffcc; font-weight: bold; margin-right: 10px; }

        .btn-launch {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 50px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00ffcc55;
            transition: 0.3s;
        }

        .btn-launch:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 50px #00ffcc;
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(0, 255, 204, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>

<div id="terminal">
    <div style="color: #00ffcc; font-weight: bold;">[SYSTEM INITIALIZING...]</div>
    <div id="logs"></div>
</div>

<button class="btn-launch" onclick="breakTheLimits()">BYPASS & START SYSTEM</button>

<div class="input-area">
    <span class="cursor">NEXUS_CORE > </span>
    <input type="text" id="command-input" placeholder="Enter security key..." readonly>
</div>

<script>
    const logs = document.getElementById('logs');
    const messages = [
        "Connecting to Cyber-Nexus-Core...",
        "Bypassing Replit Frame Constraints...",
        "Establishing Secure Node...",
        "Encrypting Connection gxplcp.biz...",
        "System Ready. Limits Broken."
    ];

    let i = 0;
    function printLogs() {
        if (i < messages.length) {
            let p = document.createElement('div');
            p.innerHTML = `> ${messages[i]}`;
            logs.appendChild(p);
            i++;
            setTimeout(printLogs, 800);
        }
    }
    printLogs();

    function breakTheLimits() {
        // यह कमांड रिप्लिट की पाबंदियों को तोड़कर उसे एक अलग लेयर में खोल देगी
        const targetURL = "https://cyber-nexus-core--gxplcpbiz.replit.app/";
        
        // हम इसे पूरी तरह से एक नई विंडो में 'Popup' के तौर पर खोलेंगे
        // जिससे 'Connection Closed' वाली समस्या जड़ से खत्म हो जाएगी
        const win = window.open("", "NexusCore", "toolbar=no,location=no,directories=no,status=no,menubar=no,scrollbars=yes,resizable=yes,width=" + screen.width + ",height=" + screen.height);
        
        if (win) {
            win.document.write(`
                <html>
                <head><title>Nexus Core Loaded</title></head>
                <body style="margin:0; padding:0; background:#000;">
                    <iframe src="${targetURL}" style="width:100%; height:100vh; border:none;"></iframe>
                </body>
                </html>
            `);
        } else {
            // अगर पॉपअप ब्लॉक हो तो सीधे रिप्लिट पर भेज दो
            window.location.href = targetURL;
        }
    }
</script>

</body>
</html>
