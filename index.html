<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Nexus Core | Secure Access</title>
    <style>
        /* पूरी स्क्रीन को लॉक करने के लिए */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* ताकि कोई स्क्रॉल न कर सके */
            background-color: #000;
        }

        .system-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* हम फ्रेम को 50px एक्स्ट्रा लंबा करेंगे ताकि Replit का लोगो नीचे दब जाए */
            height: calc(100% + 50px); 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* ये कमांड्स रिप्लिट के एक्स्ट्रा मेनू को छुपाने में मदद करती हैं */
            overflow: hidden;
        }

        /* एक ऊपरी पट्टी (Overlay) ताकि लुक और भी प्रोफेशनल लगे */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #00ffcc;
            z-index: 100;
            box-shadow: 0 0 15px #00ffcc;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <div class="system-container">
        <iframe 
            src="https://cyber-nexus-core--gxplcpbiz.replit.app/?embed=1" 
            allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
