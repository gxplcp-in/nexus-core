<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CORE | OFFICIAL SYSTEM</title>
    <style>
        /* सभी डिफॉल्ट सेटिंग्स को ज़ीरो करना */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* ब्लैक बैकग्राउंड */
        }

        /* यह कंटेनर रिप्लिट की ब्रांडिंग को स्क्रीन के बाहर धकेल देगा */
        .app-container {
            position: absolute;
            /* टॉप और बॉटम से 60px बाहर खींचना ताकि लोगो और हेडर कट जाए */
            top: -55px; 
            left: 0;
            width: 100%;
            height: calc(100% + 110px); 
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
        }

        /* एक सुरक्षा लेयर जो रिप्लिट के 'राइट क्लिक' या एक्स्ट्रा बटनों को रोकती है */
        .security-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 5;
            pointer-events: none; /* ताकि आप अंदर के बटन दबा सकें पर रिप्लिट का मेनू न खुले */
        }
    </style>
</head>
<body>

    <div class="security-layer"></div>

    <div class="app-container">
        <iframe 
            src="https://cyber-nexus-core--gxplcpbiz.replit.app/?embed=true" 
            allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
            sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts">
        </iframe>
    </div>

    <script>
        // राइट क्लिक बंद करना ताकि कोई रिप्लिट का सोर्स न देख सके
        document.oncontextmenu = function() { return false; }
        
        // कीबोर्ड शॉर्टकट बंद करना
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>

</body>
</html>
